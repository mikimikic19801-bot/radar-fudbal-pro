<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fudbal radar</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#030712">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --bg: #030712;
            --card: #111827;
            --accent: #10b981; 
            --accent-glow: rgba(16, 185, 129, 0.2);
            --drop: #ef4444; 
            --text: #f9fafb;
            --text-muted: #9ca3af;
            --soccer-color: #3b82f6;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .app-container { width: 100%; max-width: 440px; }

        header { 
            text-align: center; 
            margin-top: 10px;
            margin-bottom: 25px; 
        }
        
        header h1 { 
            font-size: 26px; 
            font-weight: 900;
            color: var(--text); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        header h1 span {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .radar-pulse {
            width: 12px; height: 12px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 0 var(--accent-glow);
            animation: radar-ping 1.8s infinite cubic-bezier(0.25, 0, 0, 1);
        }

        @keyframes radar-ping {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .action-card {
            background: var(--card);
            border-radius: 20px; padding: 20px;
            border: 1px solid #1f2937;
            margin-bottom: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        button {
            background: var(--accent);
            border: none; color: #000;
            font-weight: 800; border-radius: 14px; padding: 16px;
            cursor: pointer; transition: 0.15s ease-in-out; 
            text-transform: uppercase;
            width: 100%; font-size: 15px; letter-spacing: 1px;
            box-shadow: 0 4px 14px var(--accent-glow);
        }
        button:active { transform: scale(0.98); background: #059669; }

        .auto-toggle {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 15px; padding-top: 15px; border-top: 1px solid #1f2937;
            font-size: 13px; font-weight: bold; color: var(--text-muted);
        }

        .switch {
            position: relative; display: inline-block; width: 50px; height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #374151; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(24px); }

        .sport-group {
            margin-bottom: 25px;
            width: 100%;
        }

        .sport-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            padding-left: 5px;
        }

        .sport-header.soccer { color: var(--soccer-color); }

        .match-card {
            background: var(--card);
            border-radius: 20px; padding: 20px;
            margin-bottom: 15px; 
            border: 1px solid #1f2937;
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .match-meta {
            display: flex; justify-content: space-between; 
            font-size: 12px; color: var(--text-muted);
            font-weight: 700; text-transform: uppercase;
            border-bottom: 1px solid #1f2937;
            padding-bottom: 10px;
        }

        .live-badge {
            color: var(--accent);
            display: flex; align-items: center; gap: 6px;
        }

        .match-teams {
            display: flex; justify-content: space-between; align-items: center;
            gap: 15px;
        }

        .team-name {
            font-size: 18px; font-weight: 800; color: var(--text);
            flex: 1;
        }
        .team-name.home { text-align: right; }
        .team-name.away { text-align: left; }

        .score-box {
            font-size: 24px; color: var(--text); font-weight: 900;
            background: #1f2937; padding: 8px 16px; border-radius: 12px;
            min-width: 60px; text-align: center;
            border: 1px solid #374151;
        }

        .alert-box {
            background: rgba(239, 68, 68, 0.1); 
            color: #f87171;
            padding: 12px 16px; border-radius: 12px; 
            font-size: 13px; font-weight: 700; 
            text-align: center; 
            border: 1px solid rgba(239, 68, 68, 0.25);
            line-height: 1.4;
        }

        .info-box {
            background: rgba(55, 65, 81, 0.3);
            color: var(--text-muted);
            padding: 10px 14px; border-radius: 12px;
            font-size: 12px; font-weight: 600;
            text-align: center;
            border: 1px solid rgba(55, 65, 81, 0.5);
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1><span class="radar-pulse"></span>Fudbal <span>radar</span></h1>
    </header>

    <div class="action-card">
        <button onclick="fetchSoccerOnly()">
            Skeniraj terene 🔄
        </button>
        <div class="auto-toggle">
            <span>Automatsko skeniranje (na 3.5 min)</span>
            <label class="switch">
                <input type="checkbox" id="autoCheck" onchange="toggleAuto()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div id="oddsDropSection" style="display: none; margin-bottom: 20px;" class="sport-group">
        <div class="sport-header" style="color: var(--drop);">
            <span>📉</span> Presek padova kvota (>10%)
        </div>
        <div id="oddsDropContainer"></div>
    </div>

    <div id="radarMonitor">
        <div style="text-align: center; color: var(--text-muted); padding: 40px 20px;">
            <p style="font-size: 15px; margin: 0 0 10px 0; font-weight: 600;">Satelit u pripravnosti.</p>
            <p style="font-size: 13px; margin: 0; color: #6b7280;">Skeniranje je podešeno samo za fudbalske mečeve.</p>
        </div>
    </div>
</div>

<script>
    const API_KEY = "f1cce1e4be71307c45a7a206e4a16495";
    const ODDS_API_KEY = "0fe3d301aa11cda024d49acef8511f22";
    
    let autoInterval = null;
    let knownAlerts = new Set();
    let initialOddsData = {};
    let matchesData = {};

    // Učitavanje kvota sa The-Odds-API na samom startu
    fetchInitialOdds();

    if ("Notification" in window) {
        Notification.requestPermission();
    }

    function playRadarSound(type) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            if (type === 'danger') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(650, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.4);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            } else {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1600, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.35);
                gainNode.gain.setValueAtTime(0.25, audioCtx.currentTime);
            }

            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.4);
        } catch (e) {
            console.log("Audio blokiran.");
        }
    }

    function sendNotification(title, body, matchId, type = 'info') {
        if (knownAlerts.has(matchId)) return;
        knownAlerts.add(matchId);

        playRadarSound(type);

        if (Notification.permission === "granted") {
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification(title, {
                    body: body,
                    icon: "https://cdn-icons-png.flaticon.com/512/2619/2619245.png",
                    vibrate: [400, 100, 400],
                    badge: "https://cdn-icons-png.flaticon.com/512/2619/2619245.png"
                });
            });
        }
    }

    function toggleAuto() {
        const isChecked = document.getElementById('autoCheck').checked;
        if (isChecked) {
            fetchSoccerOnly();
            autoInterval = setInterval(fetchSoccerOnly, 210000); // 3.5 minuta
        } else {
            clearInterval(autoInterval);
        }
    }

    async function fetchInitialOdds() {
        try {
            const response = await fetch(`https://api.the-odds-api.com/v4/sports/soccer/odds/?apiKey=${ODDS_API_KEY}&regions=eu&markets=h2h`);
            if (!response.ok) throw new Error("Problem sa Odds API-jem");
            const data = await response.json();
            
            data.forEach(match => {
                const homeTeam = match.home_team;
                const awayTeam = match.away_team;
                const h2h = match.bookmakers[0]?.markets[0]?.outcomes;
                
                if (h2h) {
                    const homeOdds = h2h.find(o => o.name === homeTeam)?.price;
                    const awayOdds = h2h.find(o => o.name === awayTeam)?.price;
                    
                    initialOddsData[`${homeTeam}-${awayTeam}`] = {
                        home: homeOdds,
                        away: awayOdds,
                        timestamp: Date.now()
                    };
                }
            });
            localStorage.setItem('fudbalRadarOdds', JSON.stringify(initialOddsData));
            console.log("Početne kvote za sve svetske lige osvežene.");
        } catch (e) {
            console.warn("Učitavanje sačuvanih kvota sa memorije...");
            initialOddsData = JSON.parse(localStorage.getItem('fudbalRadarOdds')) || {};
        }
    }

    async function fetchFromAPI(endpoint, host) {
        const response = await fetch(`https://${host}/${endpoint}`, {
            method: 'GET',
            headers: {
                'x-rapidapi-host': host,
                'x-rapidapi-key': API_KEY
            }
        });
        const data = await response.json();
        return data.response || [];
    }

    async function fetchSoccerOnly() {
        const monitor = document.getElementById('radarMonitor');
        if (!document.getElementById('autoCheck').checked) {
            monitor.innerHTML = '<p style="text-align: center; color: var(--accent); font-weight: 700; padding: 40px 0;">Skeniram satelitske podatke za fudbal...</p>';
        }

        let soccerData = [];
        checkTimeForOddsReport();

        try {
            soccerData = await fetchFromAPI('fixtures?live=all', 'v3.football.api-sports.io');
        } catch (e) {
            console.error("Fudbal API Offline:", e);
        }

        if (soccerData.length === 0) {
            activateTestMatches();
        } else {
            renderResults(soccerData);
        }
    }

    function activateTestMatches() {
        const testSoccer = [
            {
                fixture: { id: 8881, status: { elapsed: 55 } },
                teams: { home: { name: "Real Madrid" }, away: { name: "Cadiz" } },
                goals: { home: 0, away: 1 },
                league: { name: "La Liga" }
            },
            {
                fixture: { id: 8882, status: { elapsed: 78 } },
                teams: { home: { name: "Arsenal" }, away: { name: "Everton" } },
                goals: { home: 0, away: 0 },
                league: { name: "Premier League" }
            }
        ];

        initialOddsData["Real Madrid-Cadiz"] = { home: 1.25, away: 11.00 };
        initialOddsData["Arsenal-Everton"] = { home: 1.40, away: 7.50 };

        renderResults(testSoccer);
    }

    function renderResults(soccer) {
        const monitor = document.getElementById('radarMonitor');
        monitor.innerHTML = '';
        
        const soccerElements = analyzeSoccer(soccer);
        if (soccerElements.length > 0) {
            const group = createSportGroup("Fudbal Radar", "soccer", "⚽");
            soccerElements.forEach(card => group.appendChild(card));
            monitor.appendChild(group);
        } else {
            monitor.innerHTML = `
                <div style="text-align: center; color: var(--text-muted); padding: 40px 20px;">
                    <p style="font-size: 15px; margin: 0 0 10px 0; font-weight: 600;">Skeniranje uspešno.</p>
                    <p style="font-size: 13px; margin: 0; color: #6b7280;">Nema trenutno aktivnih utakmica na mreži.</p>
                </div>
            `;
        }
    }

    function createSportGroup(title, className, emoji) {
        const div = document.createElement('div');
        div.className = 'sport-group';
        div.innerHTML = `
            <div class="sport-header ${className}">
                <span>${emoji}</span> ${title}
            </div>
        `;
        return div;
    }

    function findMatchKey(home, away) {
        const keys = Object.keys(initialOddsData);
        const match = keys.find(k => k.toLowerCase().includes(home.toLowerCase()) || k.toLowerCase().includes(away.toLowerCase()));
        return match || `${home}-${away}`;
    }

    function analyzeSoccer(fixtures) {
        const elements = [];
        fixtures.forEach(match => {
            const fixtureId = match.fixture.id;
            const matchId = "soc_" + fixtureId;
            const homeTeam = match.teams.home.name;
            const awayTeam = match.teams.away.name;
            const homeScore = match.goals.home ?? 0;
            const awayScore = match.goals.away ?? 0;
            const elapsed = match.fixture.status.elapsed;
            const league = match.league.name;

            const matchKey = findMatchKey(homeTeam, awayTeam);
            const initOdds = initialOddsData[matchKey];

            const isHomeFav = initOdds && initOdds.home < 1.75;
            const isAwayFav = initOdds && initOdds.away < 1.75;
            const hasFav = isHomeFav || isAwayFav;

            let isAlert = false;
            let alertReason = "";

            const prevState = matchesData[fixtureId] || {};

            // ALARM: Favorit gubi
            if (hasFav) {
                if (isHomeFav && awayScore > homeScore && prevState.lastAwayGoals !== awayScore) {
                    isAlert = true;
                    alertReason = `🔥 ALARM FAVORIT GUBI: ${homeTeam} gubi na svom terenu! (${homeScore}:${awayScore})`;
                } else if (isAwayFav && homeScore > awayScore && prevState.lastHomeGoals !== homeScore) {
                    isAlert = true;
                    alertReason = `🔥 ALARM FAVORIT GUBI: ${awayTeam} gubi u gostima! (${homeScore}:${awayScore})`;
                }

                // ALARM: Nerešeno u 75' minutu kod utakmica sa favoritom
                if (elapsed >= 75 && elapsed <= 85 && homeScore === awayScore && prevState.checked75 !== true) {
                    isAlert = true;
                    alertReason = `⏰ FINIŠ DRAMA (75'+): Favorit na meču je nerešen! Rezultat: ${homeScore}:${awayScore}. Traži se kasni gol!`;
                    matchesData[fixtureId] = { ...prevState, checked75: true };
                }
            }

            matchesData[fixtureId] = {
                ...matchesData[fixtureId],
                lastHomeGoals: homeScore,
                lastAwayGoals: awayScore
            };

            let oddsInfo = "Pratimo situaciju...";
            if (initOdds) {
                oddsInfo = `Početna kvota na favorita: ${isHomeFav ? initOdds.home + ' (D)' : initOdds.away + ' (G)'}`;
            }

            if (isAlert) {
                elements.push(createMatchCard(league, elapsed + "'", homeTeam, awayTeam, `${homeScore}:${awayScore}`, alertReason, true));
                sendNotification("Fudbal Radar Signal!", `${homeTeam} - ${awayTeam} (${elapsed}'). ${alertReason}`, matchId, 'danger');
            } else {
                elements.push(createMatchCard(league, elapsed + "'", homeTeam, awayTeam, `${homeScore}:${awayScore}`, oddsInfo, false));
            }
        });
        return elements;
    }

    function createMatchCard(league, meta, home, away, score, text, isAlert) {
        const card = document.createElement('div');
        card.className = 'match-card';
        
        const bottomBox = isAlert 
            ? `<div class="alert-box">${text}</div>` 
            : `<div class="info-box">${text}</div>`;

        card.innerHTML = `
            <div class="match-meta">
                <span>🏆 ${league}</span>
                <span class="live-badge"><span class="radar-pulse"></span>${meta}</span>
            </div>
            <div class="match-teams">
                <span class="team-name home">${home}</span>
                <span class="score-box">${score}</span>
                <span class="team-name away">${away}</span>
            </div>
            ${bottomBox}
        `;
        return card;
    }

    function checkTimeForOddsReport() {
        const now = new Date();
        const hours = now.getHours();
        const minutes = now.getMinutes();

        if ((hours === 13 && minutes === 0) || (hours === 17 && minutes === 0)) {
            generateOddsDropReport();
        }
    }

    async function generateOddsDropReport() {
        try {
            await fetchInitialOdds();
            const section = document.getElementById('oddsDropSection');
            const container = document.getElementById('oddsDropContainer');
            container.innerHTML = '';

            let detectedDrops = [];
            const localHistory = JSON.parse(localStorage.getItem('fudbalRadarOdds')) || {};

            Object.keys(initialOddsData).forEach(key => {
                const current = initialOddsData[key];
                const old = localHistory[key];

                if (old && current) {
                    const currentFav = current.home < current.away ? current.home : current.away;
                    const oldFav = old.home < old.away ? old.home : old.away;

                    const dropPercent = ((oldFav - currentFav) / oldFav) * 100;
                    if (dropPercent >= 10) {
                        detectedDrops.push({
                            match: key,
                            oldOdds: oldFav.toFixed(2),
                            newOdds: currentFav.toFixed(2),
                            percent: dropPercent.toFixed(1)
                        });
                    }
                }
            });

            if (detectedDrops.length > 0) {
                section.style.display = 'block';
                playRadarSound('info');
                sendNotification("Fudbal Radar Presek", `Detektovan pad kvota na ${detectedDrops.length} utakmica!`, 'drop_report_alert');

                detectedDrops.forEach(drop => {
                    const row = document.createElement('div');
                    row.className = "match-card";
                    row.style.padding = "15px";
                    row.style.marginBottom = "10px";
                    row.innerHTML = `
                        <div class="match-meta">
                            <span>📉 Pad kvote</span>
                            <span style="color: var(--drop); font-weight: 800;">-${drop.percent}%</span>
                        </div>
                        <div style="font-size: 14px; font-weight: 800; text-align: center; margin: 5px 0;">
                            ${drop.match}
                        </div>
                        <div class="info-box" style="display: flex; justify-content: space-around; font-size: 12px;">
                            <span>Prethodna: <span style="text-decoration: line-through;">${drop.oldOdds}</span></span>
                            <span>Nova kvota: <span style="color: var(--accent); font-weight: 800;">${drop.newOdds}</span></span>
                        </div>
                    `;
                    container.appendChild(row);
                });
            }
        } catch (e) {
            console.error("Greška pri generisanju izveštaja o padu kvota:", e);
        }
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
